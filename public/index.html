<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Nail Booking</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f9f3ff;
  margin: 0;
  padding: 0;
}

header {
  background: linear-gradient(90deg, #d946ef, #a855f7);
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  margin: 0;
  font-size: 22px;
}

.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

button {
  background: #a855f7;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #9333ea;
}

select, input[type="file"] {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
  width: 100%;
  margin-bottom: 10px;
}

.booking-card {
  border-left: 5px solid #a855f7;
  padding: 15px;
  margin-bottom: 10px;
  background: #faf5ff;
  border-radius: 8px;
}

.badge {
  padding: 5px 10px;
  border-radius: 20px;
  color: white;
  font-size: 12px;
}

.pending { background: orange; }
.approved { background: green; }
.rejected { background: red; }

img {
  margin-top: 10px;
  border-radius: 8px;
  max-width: 150px;
}

.auth a {
  color: white;
  margin-left: 10px;
  text-decoration: none;
  font-weight: bold;
}

.badge {
  padding:4px 10px;
  border-radius:12px;
  color:white;
  font-size:12px;
}

.badge.pending {
  background:orange;
}

.badge.approved {
  background:green;
}

.badge.rejected {
  background:red;
}

</style>

<head>
  <meta charset="UTF-8">
  <title>ร้านทำเล็บ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 🔐 LOGIN SECTION -->
<div id="authSection" style="text-align:right; padding:10px;"></div>

<div class="container">

  <h1>💅 ร้านทำเล็บ</h1>

  <!-- 📌 SERVICES -->
  <h2>บริการ</h2>
  <select id="serviceSelect"></select>

  <!-- 📅 SLOTS -->
  <h2>เลือกเวลา</h2>
  <select id="slotSelect"></select>

  <!-- 📤 BOOK -->
  <h2>จองคิว</h2>
  <form action="/book" method="POST" enctype="multipart/form-data">

    <input type="hidden" name="serviceId" id="serviceId">
    <input type="hidden" name="slotId" id="slotId">

    <label>อัปโหลดสลิป:</label>
    <input type="file" name="slip" required>

    <br><br>
    <button type="submit">จอง</button>
  </form>

  <!-- 📋 MY BOOKINGS -->
  <h2>รายการจองของฉัน</h2>
  <div id="myBookings"></div>

</div>

<script>

/* ================= LOGIN ================= */

async function checkLogin() {

  try {

    const res = await fetch("/api/me", {
      credentials: "include"
    });

    if (!res.ok) {
      showGuest();
      return;
    }

    const data = await res.json();

    if (!data.user) {
      showGuest();
      return;
    }

    document.getElementById("authSection").innerHTML = `
      👤 ${data.user.username}
      <a href="/logout">🚪 Logout</a>
    `;

    loadMyBookings();

  } catch (err) {
    console.log(err);
    showGuest();
  }
}

function showGuest() {
  document.getElementById("authSection").innerHTML =
    `<a href="/login.html">🔑 Login</a>
     <a href="/register.html">📝 Register</a>`;
}

/* ================= LOAD SERVICES ================= */

async function loadServices() {

  const res = await fetch("/api/services");
  const services = await res.json();

  const select = document.getElementById("serviceSelect");

  select.innerHTML = "";

  services.forEach(s => {
    const option = document.createElement("option");
    option.value = s._id;
    option.textContent = `${s.name} (${s.price} บาท)`;
    select.appendChild(option);
  });

  if (services.length > 0) {
    document.getElementById("serviceId").value = services[0]._id;
  }

  select.addEventListener("change", () => {
    document.getElementById("serviceId").value = select.value;
  });
}

/* ================= LOAD SLOTS ================= */

async function loadSlots() {

  const res = await fetch("/api/slots");
  const slots = await res.json();

  const select = document.getElementById("slotSelect");

  select.innerHTML = "";

  slots
    .filter(s => s.status === "available")
    .forEach(s => {

      const option = document.createElement("option");
      option.value = s._id;
      option.textContent = `${s.date} - ${s.time}`;

      select.appendChild(option);
    });

  if (slots.length > 0) {
    document.getElementById("slotId").value = select.value;
  }

  select.addEventListener("change", () => {
    document.getElementById("slotId").value = select.value;
  });
}

/* ================= MY BOOKINGS ================= */

async function loadMyBookings() {

  const res = await fetch("/api/my-bookings", {
    credentials: "include"
  });

  if (!res.ok) return;

  const bookings = await res.json();

  const div = document.getElementById("myBookings");

  div.innerHTML = "";

  if (bookings.length === 0) {
    div.innerHTML = "ไม่มีรายการจอง";
    return;
  }

  bookings.forEach(b => {

    const el = document.createElement("div");

    el.innerHTML = `
      <p>
        ${b.service} | ${b.date} ${b.time}
        <br>
        สถานะ: ${b.status}
        ${b.reason ? `<br>เหตุผล: ${b.reason}` : ""}
        <br>
        ${b.slip ? `<a href="${b.slip}" target="_blank">ดูสลิป</a>` : ""}
        <br>
        <button onclick="deleteBooking('${b.id}')">ลบ</button>
      </p>
      <hr>
    `;

    div.appendChild(el);
  });
}

/* ================= DELETE ================= */

async function deleteBooking(id) {

  await fetch("/api/delete-my-booking", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    credentials: "include",
    body: JSON.stringify({ id })
  });

  loadMyBookings();
}

/* ================= INIT ================= */

checkLogin();
loadServices();
loadSlots();

</script>

</body>
</html>
