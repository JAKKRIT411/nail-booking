<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
display:flex;
background:#f1f5f9;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#111827;
color:white;
min-height:100vh;
padding:20px;
}

.sidebar h2{
margin-bottom:25px;
}

.menu-item{
padding:10px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
}

.menu-item:hover{
background:#374151;
}

/* MAIN */

.main{
flex:1;
padding:20px;
}

header{
background:white;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.section{display:none}
.active{display:block}

/* CARD */

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

/* SLOT */

.slot{
background:#f9fafb;
padding:8px;
border-radius:8px;
margin-bottom:6px;
font-size:13px;
}

/* BADGE */

.badge{
padding:4px 8px;
border-radius:12px;
font-size:11px;
color:white;
}

.green{background:#16a34a}
.orange{background:#f59e0b}
.gray{background:#6b7280}

/* BUTTON */

button{
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
background:#111827;
color:white;
font-size:12px;
}

button:hover{opacity:0.85}

input{
padding:6px;
border-radius:6px;
border:1px solid #ddd;
margin-right:6px;
}

img{
max-width:150px;
border-radius:8px;
margin-top:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Admin</h2>

<div class="menu-item" onclick="show('dashboard')">📊 Dashboard</div>
<div class="menu-item" onclick="show('calendar')">📆 Calendar</div>
<div class="menu-item" onclick="show('bookings')">📋 Bookings</div>
<div class="menu-item" onclick="show('services')">💅 Services</div>

</div>

<div class="main">

<header>

<div>
<strong>Admin Panel</strong>
</div>

<div>
👤 <span id="adminName"></span>
<button onclick="logout()">Logout</button>
</div>

</header>

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<div class="grid">

<div class="card">
<h3>Revenue</h3>
<h2 id="totalRevenue">0</h2>
</div>

<div class="card">
<h3>Total Bookings</h3>
<h2 id="totalBookings">0</h2>
</div>

</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<!-- CALENDAR -->

<div id="calendar" class="section">

<div class="card">

<input type="date" id="slotDate">
<input type="time" id="slotTime">

<button onclick="addSlot()">Add Slot</button>

</div>

<div class="grid" id="calendarGrid"></div>

</div>

<!-- BOOKINGS -->

<div id="bookings" class="section">
<div id="bookingList"></div>
</div>

<!-- SERVICES -->

<div id="services" class="section">

<div class="card">

<input id="newName" placeholder="Service name">
<input id="newPrice" type="number" placeholder="Price">

<button onclick="addService()">Add</button>

</div>

<div id="serviceList"></div>

</div>

</div>

<script>

/* AUTH */

async function checkAuth(){

const res = await fetch("/api/me",{credentials:"include"})

if(!res.ok){
location="/login.html"
return
}

const data = await res.json()

if(!data.user || data.user.role!=="admin"){
location="/login.html"
return
}

adminName.innerText = data.user.username

}

function logout(){
location="/logout"
}

/* MENU */

function show(id){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id)
.classList.add("active")

}

/* DASHBOARD */

async function loadRevenue(){

const res = await fetch("/admin/revenue",{credentials:"include"})
const data = await res.json()

const labels = Object.keys(data)
const values = Object.values(data)

let total = values.reduce((a,b)=>a+b,0)

totalRevenue.innerText = total + " บาท"

new Chart(chart,{
type:"bar",
data:{
labels,
datasets:[{
label:"Revenue",
data:values
}]
}
})

}

/* CALENDAR */

async function loadCalendar(){

const res = await fetch("/admin/all-slots",{credentials:"include"})
const slots = await res.json()

const grid = document.getElementById("calendarGrid")

grid.innerHTML=""

slots.forEach(s=>{

grid.innerHTML += `

<div class="card">

<strong>${s.date}</strong><br>

<div class="slot">
⏰ ${s.time}<br>
<span class="badge ${s.status==="available"?"green":"orange"}">
${s.status}
</span>
</div>

<button onclick="deleteSlot('${s._id}')"
${s.status==="booked"?"disabled":""}
>Delete</button>

</div>

`

})

}

async function addSlot(){

const date = slotDate.value
const time = slotTime.value

if(!date || !time) return alert("กรอกข้อมูล")

await fetch("/admin/add-slot",{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({date,time})
})

loadCalendar()

}

async function deleteSlot(id){

await fetch("/admin/delete-slot",{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({id})
})

loadCalendar()

}

/* BOOKINGS */

async function loadBookings(){

const res = await fetch("/admin/bookings",{credentials:"include"})
const data = await res.json()

bookingList.innerHTML=""

totalBookings.innerText = data.length

data.forEach(b=>{

bookingList.innerHTML += `

<div class="card">

<strong>${b.user}</strong><br>

📅 ${b.date} ⏰ ${b.time}<br>
💅 ${b.service} (${b.price})<br>

${b.slip ? `<img src="${b.slip}" onclick="window.open('${b.slip}')">` : ""}

<br><br>

<span class="badge ${
b.status==="approved"?"green":
b.status==="rejected"?"gray":"orange"
}">
${b.status}
</span>

<br><br>

${b.status==="pending"?`

<button onclick="approve('${b.id}')">Approve</button>
<button onclick="reject('${b.id}')">Reject</button>

`:""}

</div>

`

})

}

async function approve(id){

await fetch("/admin/update-booking",{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({id,status:"approved"})
})

loadBookings()
}

async function reject(id){

const reason = prompt("เหตุผล")

await fetch("/admin/update-booking",{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({id,status:"rejected",reason})
})

loadBookings()

}

/* SERVICES */

async function loadServices(){

const res = await fetch("/api/services")
const data = await res.json()

serviceList.innerHTML=""

data.forEach(s=>{

serviceList.innerHTML += `

<div class="card">

${s.name} - ${s.price} บาท

<button onclick="deleteService('${s.id}')">
Delete
</button>

</div>

`

})

}

async function addService(){

await fetch("/admin/add-service",{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({
name:newName.value,
price:newPrice.value
})
})

newName.value=""
newPrice.value=""

loadServices()

}

async function deleteService(id){

await fetch("/admin/delete-service",{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({id})
})

loadServices()

}

/* START */

checkAuth()

loadRevenue()
loadCalendar()
loadBookings()
loadServices()

</script>

</body>
</html>
